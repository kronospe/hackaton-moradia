<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Moradia Digna{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">🏠 Moradia Digna</a>
    <ul class="nav-links">
      <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Início</a></li>
      <li><a href="/programas" {% if request.path == '/programas' %}class="active"{% endif %}>Programas</a></li>
      <li><a href="/cadastro" {% if request.path == '/cadastro' %}class="active"{% endif %}>Cadastro</a></li>
    </ul>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>© 2025 Moradia Digna — Projeto Universitário</p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
